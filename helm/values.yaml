# Global environment variables
replicaCount: 1

image:
  # Base repository URL
  repository: trialjdz9wr.jfrog.io/petclinic-docker/spring-petclinic
  # The specific tag/build number to deploy
  tag: "12"
  pullPolicy: IfNotPresent

service:
  type: LoadBalancer
  port: 8080

# Resource requests/limits (best practice: prevent noisy-neighbour and OOM)
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

# Health checks via Spring Boot Actuator
probes:
  path: /actuator/health
  liveness:
    initialDelaySeconds: 60
    periodSeconds: 15
  readiness:
    initialDelaySeconds: 30
    periodSeconds: 10

# Container hardening (complements the non-root user baked into the image)
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL
